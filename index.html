<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ecore Solutions</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="announcement-bar">
  <p class="announcement-text">
  ⚡ New system update live — Ecore Solutions is fully under Maintenence
</p>
</div>
<!-- ================= NAVBAR ================= -->
<header class="navbar">
  <div class="logo">Ecore Solutions</div>

  <nav class="nav-links">
    <a href="#home">Home</a>
    <a href="#products">Shop</a>
    <a href="#features">Features</a>
    <a href="#contact">Contact</a>
  </nav>

  <a class="btn primary" href="#products">Enter Shop</a>
</header>

<!-- ================= HERO ================= -->
<section class="hero" id="home">
  <div class="hero-content">

    <p class="tagline">SECURE • FAST • CONTROLLED</p>

    <h1 class="hero-title" data-text="Ecore Solutions">
      Ecore Solutions
    </h1>

    <p class="subtitle">
      Next-gen tools, utilities, and systems built for performance and precision.
    </p>

    <div class="hero-buttons">
      <a href="#products" class="btn primary">View Products</a>
      <a href="#features" class="btn secondary">Learn More</a>
    </div>

  </div>
</section>

<!-- ================= PLACEHOLDER SECTIONS ================= -->
<section id="products"></section>
<section id="features"></section>
<section id="contact"></section>

<!-- ================= NAVBAR SCROLL SCRIPT ================= -->
<script>
  const navbar = document.querySelector(".navbar");

  window.addEventListener("scroll", () => {
    if (window.scrollY > 10) {
      navbar.classList.add("scrolled");
    } else {
      navbar.classList.remove("scrolled");
    }
  });
</script>

</body>
</html>
